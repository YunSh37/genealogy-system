<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>族谱管理系统</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- ==================== 登录/注册 ==================== -->
<div id="view-login" class="view active">
  <div class="login-container">
    <div class="login-header">
      <div class="login-logo">家</div>
      <h1>族谱管理系统</h1>
      <p>传承家族记忆，续写血脉篇章</p>
    </div>
    <div class="login-card">
      <div class="login-tabs">
        <button class="login-tab active" data-tab="login">登 录</button>
        <button class="login-tab" data-tab="register">注 册</button>
      </div>
      <!-- 登录表单 -->
      <form id="form-login" class="login-form active">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="login-username" placeholder="请输入用户名" minlength="3" required>
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="login-password" placeholder="请输入密码" minlength="6" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">登 录</button>
        <p id="login-error" class="form-error"></p>
      </form>
      <!-- 注册表单 -->
      <form id="form-register" class="login-form">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="reg-username" placeholder="至少3个字符" minlength="3" required>
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="reg-password" placeholder="至少6个字符" minlength="6" required>
        </div>
        <div class="form-group">
          <label>确认密码</label>
          <input type="password" id="reg-confirm" placeholder="再次输入密码" minlength="6" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">注 册</button>
        <p id="reg-error" class="form-error"></p>
      </form>
    </div>
  </div>
</div>

<!-- ==================== 主界面 ==================== -->
<div id="view-main" class="view">
  <!-- 顶部导航 -->
  <header id="topbar">
    <div class="topbar-left">
      <span class="topbar-brand" id="btn-home">家</span>
      <div class="topbar-search">
        <input type="text" id="global-search" placeholder="搜索族谱成员...">
        <button id="btn-search">🔍</button>
      </div>
    </div>
    <div class="topbar-right">
      <span id="topbar-user"></span>
      <button id="btn-logout" class="btn btn-sm">退出</button>
    </div>
  </header>

  <div id="main-content">
    <!-- ===== 族谱列表页 ===== -->
    <div id="page-genealogy-list" class="page active">
      <div class="page-header">
        <h2>我的族谱</h2>
        <button id="btn-create-genealogy" class="btn btn-primary">+ 创建族谱</button>
      </div>
      <div id="genealogy-grid" class="genealogy-grid"></div>
      <div id="genealogy-empty" class="empty-state" style="display:none">
        <div class="empty-icon">📜</div>
        <p>还没有族谱，点击上方按钮创建第一个族谱吧</p>
      </div>
    </div>

    <!-- ===== 族谱工作区 ===== -->
    <div id="page-genealogy-workspace" class="page">
      <div class="workspace-layout">
        <!-- 左侧边栏 -->
        <aside class="workspace-sidebar">
          <div class="sidebar-genealogy-info">
            <h3 id="sidebar-genealogy-name"></h3>
            <span id="sidebar-genealogy-role" class="badge"></span>
          </div>
          <nav class="sidebar-nav">
            <a href="#" data-page="dashboard" class="nav-item active">
              <span class="nav-icon">📊</span> 族谱概览
            </a>
            <a href="#" data-page="family-tree" class="nav-item">
              <span class="nav-icon">🌳</span> 族谱树
            </a>
            <a href="#" data-page="members" class="nav-item">
              <span class="nav-icon">👥</span> 成员管理
            </a>
            <a href="#" data-page="ancestors" class="nav-item">
              <span class="nav-icon">⬆️</span> 祖先查询
            </a>
            <a href="#" data-page="descendants" class="nav-item">
              <span class="nav-icon">⬇️</span> 后代查询
            </a>
            <a href="#" data-page="relationship" class="nav-item">
              <span class="nav-icon">🔗</span> 亲缘关系
            </a>
            <a href="#" data-page="statistics" class="nav-item">
              <span class="nav-icon">📈</span> 统计分析
            </a>
            <a href="#" data-page="share" class="nav-item">
              <span class="nav-icon">🔑</span> 族谱共享
            </a>
          </nav>
          <button id="btn-back-to-list" class="btn btn-sm btn-block sidebar-back">← 返回族谱列表</button>
        </aside>

        <!-- 右侧内容区 -->
        <main class="workspace-main">
          <!-- 仪表盘 -->
          <div id="sub-dashboard" class="sub-page active">
            <div class="stats-cards" id="stats-cards"></div>
            <div class="chart-row">
              <div class="chart-card">
                <h4>男女比例</h4>
                <canvas id="chart-gender" width="260" height="200"></canvas>
              </div>
              <div class="chart-card">
                <h4>辈分分布</h4>
                <div id="generation-dist" class="gen-list"></div>
              </div>
            </div>
          </div>

          <!-- 族谱树 -->
          <div id="sub-family-tree" class="sub-page">
            <div class="tree-toolbar">
              <button id="tree-zoom-in" class="btn btn-sm">🔍+</button>
              <button id="tree-zoom-out" class="btn btn-sm">🔍-</button>
              <button id="tree-fit" class="btn btn-sm">适应</button>
              <button id="tree-reset" class="btn btn-sm">重置</button>
              <label style="margin-left:12px;font-size:13px;color:var(--color-text-light)">显示深度：</label>
              <input type="number" id="tree-depth" value="5" min="1" max="20" class="input-sm" style="width:60px">
              <button id="tree-load" class="btn btn-sm btn-primary">加载</button>
              <span class="tree-hint">🖱️ 滚轮缩放 | 拖拽平移 | 点击节点查看详情</span>
            </div>
            <div class="tree-container">
              <canvas id="tree-canvas"></canvas>
            </div>
          </div>

          <!-- 成员管理 -->
          <div id="sub-members" class="sub-page">
            <div class="member-toolbar">
              <input type="text" id="member-search" placeholder="搜索姓名..." class="input-search">
              <button id="btn-member-search" class="btn btn-primary">搜索</button>
              <button id="btn-member-clear" class="btn">清除</button>
              <span class="flex-spacer"></span>
              <button id="btn-add-member" class="btn btn-success">+ 添加成员</button>
            </div>
            <div class="table-wrapper">
              <table id="member-table" class="data-table">
                <thead>
                  <tr>
                    <th>ID</th><th>姓名</th><th>性别</th><th>出生</th><th>逝世</th>
                    <th>年龄</th><th>辈分</th><th>操作</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
            <div class="pagination" id="member-pagination"></div>
          </div>

          <!-- 祖先查询 -->
          <div id="sub-ancestors" class="sub-page">
            <div class="query-form">
              <input type="number" id="anc-member-id" placeholder="成员 ID" class="input-sm">
              <input type="number" id="anc-depth" value="10" min="1" max="50" class="input-sm" style="width:80px">
              <button id="btn-query-ancestors" class="btn btn-primary">查询祖先</button>
            </div>
            <div id="anc-result" class="query-result"></div>
          </div>

          <!-- 后代查询 -->
          <div id="sub-descendants" class="sub-page">
            <div class="query-form">
              <input type="number" id="desc-member-id" placeholder="成员 ID" class="input-sm">
              <input type="number" id="desc-depth" value="10" min="1" max="50" class="input-sm" style="width:80px">
              <button id="btn-query-descendants" class="btn btn-primary">查询后代</button>
            </div>
            <div id="desc-result" class="query-result"></div>
          </div>

          <!-- 亲缘关系查询 -->
          <div id="sub-relationship" class="sub-page">
            <div class="query-form">
              <input type="number" id="rel-id1" placeholder="成员 ID 1" class="input-sm">
              <span>↔</span>
              <input type="number" id="rel-id2" placeholder="成员 ID 2" class="input-sm">
              <button id="btn-query-relationship" class="btn btn-primary">查询关系</button>
            </div>
            <div id="rel-result" class="query-result"></div>
          </div>

          <!-- 统计分析 -->
          <div id="sub-statistics" class="sub-page">
            <div class="stats-tabs">
              <button class="stats-tab active" data-stat="longest-lived">平均寿命最长一代</button>
              <button class="stats-tab" data-stat="unmarried-men">50+岁未婚男性</button>
              <button class="stats-tab" data-stat="born-before-avg">早于平均出生年份</button>
            </div>
            <div id="stats-content" class="stats-content"></div>
          </div>

          <!-- 族谱共享 -->
          <div id="sub-share" class="sub-page">
            <div class="member-toolbar">
              <span id="share-role-hint"></span>
              <span class="flex-spacer"></span>
              <button id="btn-add-share" class="btn btn-success">+ 添加共享</button>
            </div>
            <div class="table-wrapper">
              <table id="share-table" class="data-table">
                <thead>
                  <tr><th>共享ID</th><th>用户ID</th><th>用户名</th><th>权限</th><th>创建时间</th><th>操作</th></tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </main>
      </div>
    </div>
  </div>
</div>

<!-- ==================== 模态对话框容器 ==================== -->
<div id="modal-overlay" class="modal-overlay" style="display:none">
  <div class="modal-box" id="modal-box"></div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script src="/static/js/api.js"></script>
<script src="/static/js/tree-renderer.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
